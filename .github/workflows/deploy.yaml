name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/multi-client:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/multi-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/multi-server:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/multi-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/multi-worker:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/multi-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: multi-k8s-493910
      GKE_CLUSTER: autopilot-cluster-1
      GKE_LOCATION: us-central1
      WIF_PROVIDER: projects/871393691181/locations/global/workloadIdentityPools/github-pool-multi-k8s/providers/github-provider-multi-k8s
      GCP_SERVICE_ACCOUNT: gh-actions-multi-k8s@multi-k8s-493910.iam.gserviceaccount.com

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s

      - name: Update image tags to this commit's SHA
        run: |
          kubectl set image deployment/client-deployment client=${{ vars.DOCKERHUB_USERNAME }}/multi-client:${{ github.sha }}
          kubectl set image deployment/server-deployment server=${{ vars.DOCKERHUB_USERNAME }}/multi-server:${{ github.sha }}
          kubectl set image deployment/worker-deployment worker=${{ vars.DOCKERHUB_USERNAME }}/multi-worker:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/client-deployment --timeout=300s
          kubectl rollout status deployment/server-deployment --timeout=300s
          kubectl rollout status deployment/worker-deployment --timeout=300s

      - name: Show cluster state
        run: |
          kubectl get pods
          kubectl get services
          kubectl get ingress
