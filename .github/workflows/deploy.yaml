name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: multi-k8s-493910
      GKE_CLUSTER: autopilot-cluster-1
      GKE_LOCATION: us-central1
      WIF_PROVIDER: projects/871393691181/locations/global/workloadIdentityPools/github-pool-multi-k8s/providers/github-provider-multi-k8s
      GCP_SERVICE_ACCOUNT: gh-actions-multi-k8s@multi-k8s-493910.iam.gserviceaccount.com

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/client-deployment --timeout=300s
          kubectl rollout status deployment/server-deployment --timeout=300s
          kubectl rollout status deployment/worker-deployment --timeout=300s

      - name: Show cluster state
        run: |
          kubectl get pods
          kubectl get services
          kubectl get ingress